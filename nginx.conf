limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=6r/m;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Match app-level upload limit (MAX_UPLOAD_SIZE_MB + small overhead)
    client_max_body_size 55m;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                             always;
    add_header X-Frame-Options         "DENY"                                always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # API upload endpoint — stricter rate limit
    location ~ ^/api/ingest/ {
        limit_req zone=upload burst=3 nodelay;
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # All other API paths
    location ~ ^/api/(exams|questions|jobs|health|import|editais|auth|users|opinions|gabarito)(/|$) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
